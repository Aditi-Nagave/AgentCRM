<!DOCTYPE html>
<html>

<head>

    <title>SenAI CRM Dashboard</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="header">

    <h1>SenAI CRM Intelligence Platform</h1>

</div>

<div class="navbar">

    <a href="index.html">
        Dashboard
    </a>

    <a href="inbox.html">
        Inbox
    </a>

    <a href="thread.html">
        Thread Workspace
    </a>

    <a href="analytics.html">

    </a>

    <a href="contacts.html">

    </a>

    <a href="audit.html">

</div>

<div class="container">

    <div class="stats-grid">

        <div class="stat-card">

            <h3>Total Emails</h3>

            <div
                class="stat-number"
                id="totalEmails">

                0

            </div>

        </div>

        <div class="stat-card">

            <h3>Critical</h3>

            <div
                class="stat-number"
                id="criticalEmails">

                0

            </div>

        </div>

        <div class="stat-card">

            <h3>Spam</h3>

            <div
                class="stat-number"
                id="spamEmails">

                0

            </div>

        </div>

        <div class="stat-card">

            <h3>Security</h3>

            <div
                class="stat-number"
                id="securityEmails">

                0

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
